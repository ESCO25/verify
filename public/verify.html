<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>التحقق من الهوية — GREEG</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: #1a0a00;
  }

  /* خلفية Hay Day */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 60% 0%, rgba(255,160,30,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 10% 100%, rgba(80,200,80,0.12) 0%, transparent 50%),
      linear-gradient(160deg, #1a0a00 0%, #2d1500 40%, #1a2800 100%);
  }

  /* لوغو القناة في الخلفية */
  .bg-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    height: 420px;
    background: url('https://i.imgur.com/Owaf8Cs.png') center/contain no-repeat;
    opacity: 0.04;
    z-index: 0;
    pointer-events: none;
  }

  /* دوائر زخرفية */
  .deco-circle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .dc1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,150,0,0.07) 0%, transparent 70%);
    top: -150px; right: -150px;
    animation: pulse1 6s ease-in-out infinite;
  }
  .dc2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(50,180,50,0.06) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    animation: pulse2 8s ease-in-out infinite;
  }
  @keyframes pulse1 { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* زخارف نباتية SVG */
  .leaf {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  /* البطاقة */
  .card {
    background: linear-gradient(160deg, rgba(50,28,5,0.97) 0%, rgba(30,18,3,0.99) 100%);
    border: 2px solid rgba(255,165,50,0.35);
    border-radius: 24px;
    padding: 36px 32px 32px;
    box-shadow:
      0 0 0 1px rgba(255,165,50,0.1),
      0 32px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: slideUp 0.55s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
  }

  /* شريط ذهبي علوي */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,185,60,0.8), rgba(255,220,100,1), rgba(255,185,60,0.8), transparent);
    border-radius: 24px 24px 0 0;
  }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(28px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* الهيدر */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  /* صورة البوت */
  .bot-image {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    border: 3px solid rgba(255,165,50,0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(255,150,0,0.15);
    margin: 0 auto 14px;
    display: block;
    object-fit: cover;
  }

  .brand-name {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #FFD060;
    text-shadow: 0 2px 12px rgba(255,180,0,0.4);
    margin-bottom: 4px;
  }

  .brand-sub {
    font-size: 12px;
    color: rgba(255,200,100,0.5);
    letter-spacing: 1px;
  }

  /* فاصل */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,165,50,0.25), transparent);
    margin: 20px 0;
  }

  /* شريط التقدم */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    height: 4px;
    margin-bottom: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,165,50,0.1);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c97800, #FFB020, #FFD060);
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 0 8px rgba(255,180,0,0.5);
  }

  /* المراحل */
  .step { display: none; animation: fadeIn 0.35s ease; }
  .step.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* المرحلة 1 — زر "لست روبوت" */
  .captcha-box {
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,165,50,0.2);
    border-radius: 14px;
    padding: 20px 20px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
    user-select: none;
  }
  .captcha-box:hover {
    border-color: rgba(255,165,50,0.45);
    background: rgba(255,165,50,0.05);
  }
  .captcha-box.checking {
    border-color: rgba(255,165,50,0.6);
    pointer-events: none;
  }
  .captcha-box.done {
    border-color: rgba(80,200,80,0.5);
    background: rgba(80,200,80,0.04);
    pointer-events: none;
  }

  .captcha-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .checkbox-outer {
    width: 26px;
    height: 26px;
    border: 2px solid rgba(255,165,50,0.45);
    border-radius: 5px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .captcha-box.done .checkbox-outer {
    background: #3db046;
    border-color: #3db046;
  }
  .check-svg {
    display: none;
    animation: checkPop 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .captcha-box.done .check-svg { display: block; }
  .spin-svg { display: none; animation: spin 0.7s linear infinite; }
  .captcha-box.checking .spin-svg { display: block; }
  .captcha-box.checking .checkbox-outer { border-color: rgba(255,165,50,0.6); }
  @keyframes checkPop { from{transform:scale(0)} to{transform:scale(1)} }
  @keyframes spin { to{transform:rotate(360deg)} }

  .captcha-label {
    font-size: 15px;
    font-weight: 700;
    color: #e8c880;
  }

  .captcha-logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .captcha-logo {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    object-fit: cover;
    opacity: 0.8;
  }
  .captcha-brand {
    font-size: 9px;
    color: rgba(255,200,100,0.4);
    letter-spacing: 0.5px;
  }

  /* زر التأكيد */
  .btn-main {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    background: linear-gradient(160deg, #c97800, #FFB020 50%, #e09000);
    color: #3d1e00;
    box-shadow: 0 6px 24px rgba(200,120,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    border-bottom: 3px solid rgba(0,0,0,0.3);
  }
  .btn-main:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(200,120,0,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-main:active:not(:disabled) {
    transform: translateY(1px);
    border-bottom-width: 1px;
  }
  .btn-main:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* مرحلة الفحص */
  .scan-title {
    font-size: 16px;
    font-weight: 700;
    color: #e8c880;
    margin-bottom: 6px;
  }
  .scan-sub {
    font-size: 12px;
    color: rgba(255,200,100,0.45);
    margin-bottom: 20px;
  }

  .status-list { list-style: none; margin-bottom: 20px; }
  .status-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    font-size: 13px;
    color: rgba(255,200,100,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: color 0.3s;
  }
  .status-list li.done { color: rgba(255,220,130,0.85); }
  .sicon {
    font-size: 14px;
    min-width: 18px;
    text-align: center;
  }

  /* النتيجة */
  .result-wrap { text-align: center; padding: 10px 0; }
  .result-icon-big {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
    animation: bounceIn 0.55s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes bounceIn {
    0%{transform:scale(0);opacity:0} 60%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1}
  }
  .result-title {
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 10px;
  }
  .result-title.success { color: #6de07a; text-shadow: 0 0 20px rgba(80,220,100,0.3); }
  .result-title.danger  { color: #f07070; }
  .result-desc {
    font-size: 13px;
    color: rgba(255,200,100,0.5);
    line-height: 1.8;
  }

  /* مؤشر تحميل */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(60,30,0,0.3);
    border-top-color: rgba(60,30,0,0.8);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  .footer-text {
    text-align: center;
    margin-top: 18px;
    font-size: 11px;
    color: rgba(255,180,60,0.25);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-logo"></div>
<div class="deco-circle dc1"></div>
<div class="deco-circle dc2"></div>

<!-- زخرفة نباتية -->
<svg class="leaf" style="bottom:-20px;right:-20px;width:200px;height:200px" viewBox="0 0 200 200">
  <path d="M180,180 Q80,160 20,20 Q100,60 180,180Z" fill="#3a8c20"/>
  <path d="M180,180 Q140,80 60,10 Q120,80 180,180Z" fill="#2d6e18"/>
</svg>
<svg class="leaf" style="top:-20px;left:-20px;width:160px;height:160px;transform:rotate(180deg)" viewBox="0 0 200 200">
  <path d="M180,180 Q80,160 20,20 Q100,60 180,180Z" fill="#3a8c20"/>
</svg>

<div class="container">
  <div class="card">

    <div class="header">
      <img src="https://i.imgur.com/OpgYmlS.jpeg" alt="GREEG Bot" class="bot-image"/>
      <div class="brand-name">GREEG</div>
      <div class="brand-sub">نظام التحقق الأمني</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <!-- المرحلة 1: لست روبوت -->
    <div class="step active" id="step1">
      <div class="captcha-box" id="captchaBox" onclick="handleCaptcha()">
        <div class="captcha-left">
          <div class="checkbox-outer">
            <svg class="check-svg" width="16" height="16" viewBox="0 0 16 16">
              <polyline points="3,8 7,12 13,4" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="spin-svg" width="16" height="16" viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="6" stroke="rgba(255,165,50,0.3)" stroke-width="2" fill="none"/>
              <path d="M8 2 A6 6 0 0 1 14 8" stroke="rgba(255,165,50,0.9)" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="captcha-label">لست روبوتاً</span>
        </div>
        <div class="captcha-logo-wrap">
          <img src="https://i.imgur.com/Owaf8Cs.png" alt="GREEG" class="captcha-logo"/>
          <span class="captcha-brand">GREEG</span>
        </div>
      </div>
      <button class="btn-main" id="step1Btn" onclick="proceedFromCaptcha()" disabled>
        تحقق والدخول للسيرفر
      </button>
    </div>

    <!-- المرحلة 2: الفحص -->
    <div class="step" id="step2">
      <div class="scan-title">🔍 جارٍ فحص الجهاز</div>
      <div class="scan-sub">يرجى الانتظار...</div>
      <ul class="status-list" id="statusList">
        <li id="s1"><span class="sicon">⏳</span> التحقق من المتصفح</li>
        <li id="s2"><span class="sicon">⏳</span> تحليل بيانات الجهاز</li>
        <li id="s3"><span class="sicon">⏳</span> توليد البصمة الرقمية</li>
        <li id="s4"><span class="sicon">⏳</span> فحص قاعدة البيانات</li>
        <li id="s5"><span class="sicon">⏳</span> التحقق النهائي</li>
      </ul>
    </div>

    <!-- المرحلة 3: النتيجة -->
    <div class="step" id="step3">
      <div class="result-wrap">
        <span class="result-icon-big" id="resultIcon"></span>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-desc" id="resultDesc"></div>
      </div>
    </div>

  </div>
  <div class="footer-text">GREEG Security System • مدعوم بالحماية المتقدمة</div>
</div>

<script>
const API_URL = "https://verify-sigma-wheat.vercel.app/api/verify";

let collectedData = {};
let captchaDone = false;

function getToken() {
  return new URLSearchParams(window.location.search).get("token") || "";
}

function setProgress(pct) {
  document.getElementById("progressFill").style.width = pct + "%";
}

function showStep(n) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step" + n).classList.add("active");
}

function setStatus(id, icon, done) {
  const el = document.getElementById(id);
  el.querySelector(".sicon").textContent = icon;
  if (done) el.classList.add("done");
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── التعامل مع الكابتشا ──
async function handleCaptcha() {
  if (captchaDone) return;
  const box = document.getElementById("captchaBox");
  box.classList.add("checking");
  setProgress(15);
  await sleep(900 + Math.random() * 600);
  box.classList.remove("checking");
  box.classList.add("done");
  captchaDone = true;
  setProgress(25);
  document.getElementById("step1Btn").disabled = false;
}

async function proceedFromCaptcha() {
  if (!captchaDone) return;
  showStep(2);
  setProgress(30);
  await runScans();
}

// ── جمع البصمة ──
function getCanvasFp() {
  try {
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");
    ctx.textBaseline = "top";
    ctx.font = "14px Arial";
    ctx.fillStyle = "#f60";
    ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = "#069";
    ctx.fillText("GREEG", 2, 15);
    return c.toDataURL().slice(-50);
  } catch { return "N/A"; }
}

function getWebGL() {
  try {
    const c = document.createElement("canvas");
    const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
    const ext = gl.getExtension("WEBGL_debug_renderer_info");
    return { vendor: gl.getParameter(ext.UNMASKED_VENDOR_WEBGL), renderer: gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) };
  } catch { return { vendor: "N/A", renderer: "N/A" }; }
}

async function getAudioFp() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const analyser = ctx.createAnalyser();
    const gain = ctx.createGain();
    gain.gain.value = 0;
    osc.connect(analyser); analyser.connect(gain); gain.connect(ctx.destination);
    osc.start(0);
    const data = new Float32Array(analyser.frequencyBinCount);
    analyser.getFloatFrequencyData(data);
    osc.stop(); await ctx.close();
    return data.slice(0,5).join(",");
  } catch { return "N/A"; }
}

function getStorageFp() {
  const key = "greeg_fp";
  try {
    let v = localStorage.getItem(key);
    if (!v) { v = Date.now().toString(36) + Math.random().toString(36).slice(2); localStorage.setItem(key, v); }
    return v;
  } catch { return "N/A"; }
}

async function collectAll() {
  const wgl = getWebGL();
  const audio = await getAudioFp();
  return {
    token: getToken(),
    userAgent: navigator.userAgent,
    language: navigator.language,
    platform: navigator.platform,
    screenW: screen.width, screenH: screen.height,
    colorDepth: screen.colorDepth,
    pixelRatio: window.devicePixelRatio,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    timezoneOffset: new Date().getTimezoneOffset(),
    webglVendor: wgl.vendor, webglRenderer: wgl.renderer,
    canvasFp: getCanvasFp(),
    audioFp: audio,
    storageFp: getStorageFp(),
    memory: navigator.deviceMemory || "N/A",
    cores: navigator.hardwareConcurrency || "N/A",
    touchPoints: navigator.maxTouchPoints,
    connection: (navigator.connection || {}).effectiveType || "N/A",
  };
}

async function hashData(data) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(JSON.stringify(data)));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("").slice(0,32);
}

// ── تشغيل مراحل الفحص ──
async function runScans() {
  await sleep(500);
  setStatus("s1","✅",true); setProgress(42);

  collectedData = await collectAll();
  await sleep(450);
  setStatus("s2","✅",true); setProgress(58);

  collectedData.fingerprint = await hashData(collectedData);
  await sleep(550);
  setStatus("s3","✅",true); setProgress(72);

  await sleep(400);
  setStatus("s4","✅",true); setProgress(86);

  await sleep(400);
  setStatus("s5","✅",true); setProgress(100);

  await sleep(400);
  await submitVerification();
}

async function submitVerification() {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(collectedData),
    });
    const data = await res.json();
    showStep(3);

    if (data.success) {
      document.getElementById("resultIcon").textContent  = "✅";
      document.getElementById("resultTitle").textContent = "تم التحقق بنجاح!";
      document.getElementById("resultTitle").className   = "result-title success";
      document.getElementById("resultDesc").textContent  = "تم قبولك في السيرفر 🎉\nيمكنك إغلاق هذه الصفحة والعودة إلى Discord.";
      // إغلاق تلقائي بعد 3 ثواني
      setTimeout(() => { window.close(); }, 3000);
    } else if (data.banned) {
      document.getElementById("resultIcon").textContent  = "🚫";
      document.getElementById("resultTitle").textContent = "تم حظرك من السيرفر";
      document.getElementById("resultTitle").className   = "result-title danger";
      document.getElementById("resultDesc").textContent  = "جهازك أو شبكتك محظورة من هذا السيرفر.";
    } else {
      document.getElementById("resultIcon").textContent  = "❌";
      document.getElementById("resultTitle").textContent = "فشل التحقق";
      document.getElementById("resultTitle").className   = "result-title danger";
      document.getElementById("resultDesc").textContent  = data.message || "حدث خطأ، حاول مرة أخرى.";
    }
  } catch (e) {
    showStep(3);
    document.getElementById("resultIcon").textContent  = "⚠️";
    document.getElementById("resultTitle").textContent = "خطأ في الاتصال";
    document.getElementById("resultTitle").className   = "result-title danger";
    document.getElementById("resultDesc").textContent  = "تعذر الاتصال بالسيرفر، تحقق من اتصالك بالإنترنت.";
  }
}
</script>
</body>
</html>
