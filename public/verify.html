<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GREEG — التحقق المتقدم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold-gradient: linear-gradient(90deg, #ffd700, #fff3b0, #ffcc00, #fff3b0, #ffd700);
    --green-3d: linear-gradient(145deg, #2ecc71, #27ae60);
    /* استايل النص الواضح: أبيض مع إطار أسود وظل */
    --text-glow: white;
    --text-outline: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 3px 3px 8px rgba(0,0,0,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: url('https://i.imgur.com/NO67yFT.jpeg') center/cover no-repeat fixed;
  }

  /* الفقاعات (اللوغو الصغير المتحرك) */
  .bubble {
    position: absolute;
    background: url('https://i.imgur.com/Owaf8Cs.png') center/contain no-repeat;
    bottom: -150px;
    animation: floatUp 12s infinite ease-in;
    z-index: 1;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
    opacity: 0.6;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
    20% { opacity: 0.7; }
    80% { opacity: 0.7; }
    100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 450px;
    padding: 20px;
  }

  /* الإطار الذهبي المتحرك */
  .gold-border-wrap {
    position: relative;
    padding: 6px; 
    border-radius: 35px;
    background: linear-gradient(90deg, #ffd700, #ffffff, #ffd700, #ffffff);
    background-size: 300% 300%;
    animation: goldFlow 3s linear infinite;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  @keyframes goldFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  /* اللوحة الخضراء 3D */
  .card {
    background: var(--green-3d);
    border-radius: 30px;
    padding: 40px 30px;
    text-align: center;
    position: relative;
    box-shadow: inset 0 6px 20px rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.3);
    border: 1.5px solid rgba(255,255,255,0.2);
  }

  .header img {
    width: 110px;
    height: 110px;
    border-radius: 25px;
    border: 4px solid #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }

  /* تنسيق النصوص داخل اللوحة */
  .brand-name {
    font-size: 32px; /* تكبير الخط */
    font-weight: 900;
    color: var(--text-glow);
    text-shadow: var(--text-outline);
    margin-bottom: 8px;
  }

  .brand-sub {
    font-size: 16px; /* تكبير الخط */
    font-weight: 700;
    color: var(--text-glow);
    text-shadow: var(--text-outline);
    margin-bottom: 30px;
    opacity: 0.9;
  }

  .progress-wrap {
    background: rgba(0,0,0,0.3);
    height: 12px;
    border-radius: 10px;
    margin-bottom: 30px;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.4);
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f1c40f, #f39c12);
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 15px rgba(241, 196, 15, 0.8);
  }

  .captcha-box {
    background: rgba(255, 255, 255, 0.2);
    border: 3px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    margin-bottom: 25px;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .captcha-box:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.02); }

  .captcha-label {
    font-size: 20px; /* تكبير الخط */
    font-weight: 900;
    color: var(--text-glow);
    text-shadow: var(--text-outline);
  }

  .checkbox-outer {
    width: 32px;
    height: 32px;
    border: 3px solid white;
    border-radius: 8px;
    background: rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .captcha-box.done .checkbox-outer { background: #ffd700; border-color: #ffd700; }
  .check-svg { display: none; stroke: #27ae60; stroke-width: 5; fill: none; }
  .captcha-box.done .check-svg { display: block; }

  .btn-main {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 15px;
    background: #ffd700;
    color: #27ae60;
    font-size: 22px; /* تكبير الخط */
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 8px 0 #b7950b;
    transition: 0.2s;
  }
  .btn-main:active { transform: translateY(5px); box-shadow: 0 3px 0 #b7950b; }
  .btn-main:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

  .status-list li {
    padding: 12px 0;
    color: var(--text-glow);
    text-shadow: var(--text-outline);
    font-size: 18px; /* تكبير الخط */
    font-weight: 700;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .status-list li.done { color: #ffd700; font-size: 20px; }

  .step { display: none; }
  .step.active { display: block; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes popIn { from { opacity:0; transform: scale(0.8); } to { opacity:1; transform: scale(1); } }

  .success-text { 
    color: var(--text-glow); 
    text-shadow: var(--text-outline); 
    font-weight: 900; 
    font-size: 26px; 
    margin-top: 15px;
  }

</style>
</head>
<body>

<!-- شعار مائي ثابت في المركز -->
<div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:60vh; height:60vh; background:url('https://i.imgur.com/Owaf8Cs.png') center/contain no-repeat; opacity:0.1; z-index:0; pointer-events:none;"></div>

<div class="container" id="mainContainer">
  <div class="gold-border-wrap">
    <div class="card">
      
      <div class="header">
        <img src="https://i.imgur.com/OpgYmlS.jpeg" alt="GREEG Bot"/>
        <div class="brand-name">GREEG</div>
        <div class="brand-sub">نظام التحقق المتقدم</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- الخطوة 1 -->
      <div class="step active" id="step1">
        <div class="captcha-box" id="captchaBox" onclick="handleCaptcha()">
          <div style="display:flex; align-items:center; gap:15px;">
            <div class="checkbox-outer" id="checkOuter">
              <svg class="check-svg" viewBox="0 0 24 24" width="20" height="20">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span class="captcha-label">أنا لست روبوت</span>
          </div>
          <img src="https://i.imgur.com/Owaf8Cs.png" width="35" alt="logo"/>
        </div>
        <button class="btn-main" id="step1Btn" onclick="proceedToScan()" disabled>تحقق الآن</button>
      </div>

      <!-- الخطوة 2 -->
      <div class="step" id="step2">
        <h3 style="margin-bottom:20px; color:#fff; text-shadow: var(--text-outline);">🔍 جارٍ فحص الأمان...</h3>
        <ul class="status-list" id="statusList">
          <li id="s1">🌀 تحليل بيانات المتصفح</li>
          <li id="s2">🌀 التحقق من البصمة الرقمية</li>
          <li id="s3">🌀 فحص سجلات الحظر</li>
        </ul>
      </div>

      <!-- الخطوة 3 -->
      <div class="step" id="step3">
        <div id="resultArea"></div>
      </div>

    </div>
  </div>
</div>

<script>
  // توليد لوغو GREEG كفقاعات متحركة في الخلفية
  function createLogoBubbles() {
    const body = document.body;
    for (let i = 0; i < 12; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      // حجم متوسط عشوائي
      const size = Math.random() * 50 + 40 + 'px';
      b.style.width = size;
      b.style.height = size;
      b.style.left = Math.random() * 100 + '%';
      b.style.animationDuration = (Math.random() * 5 + 8) + 's';
      b.style.animationDelay = Math.random() * 5 + 's';
      body.appendChild(b);
    }
  }
  createLogoBubbles();

  let captchaDone = false;
  const API_URL = "https://verify-sigma-wheat.vercel.app/api/verify";

  async function handleCaptcha() {
    if (captchaDone) return;
    const check = document.getElementById('checkOuter');
    check.innerHTML = '<div style="width:10px; height:10px; background:#fff; border-radius:50%; animation: pulse 0.6s infinite;"></div>';
    
    await new Promise(r => setTimeout(r, 1500));
    
    document.getElementById('captchaBox').classList.add('done');
    check.innerHTML = '<svg class="check-svg" style="display:block" viewBox="0 0 24 24" width="20" height="20"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    captchaDone = true;
    document.getElementById('step1Btn').disabled = false;
    document.getElementById('progressFill').style.width = "30%";
  }

  async function proceedToScan() {
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    
    const steps = ['s1', 's2', 's3'];
    for (let i = 0; i < steps.length; i++) {
      await new Promise(r => setTimeout(r, 1000));
      const el = document.getElementById(steps[i]);
      el.classList.add('done');
      el.innerHTML = "✅ " + el.innerText.replace('🌀 ', '');
      document.getElementById('progressFill').style.width = (40 + (i * 20)) + "%";
    }
    sendVerification();
  }

  async function sendVerification() {
    const payload = {
      token: new URLSearchParams(window.location.search).get("token") || "GREEG-CLIENT",
      userAgent: navigator.userAgent,
      screen: `${screen.width}x${screen.height}`,
      platform: navigator.platform
    };

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      showFinalResult(data.success, data.message);
    } catch (e) {
      showFinalResult(false, "خطأ في الاتصال بالخادم");
    }
  }

  function showFinalResult(success, msg) {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    document.getElementById('progressFill').style.width = "100%";
    
    const area = document.getElementById('resultArea');
    if (success) {
      area.innerHTML = `
        <div style="font-size:70px;">✅</div>
        <div class="success-text">تم التحقق بنجاح!</div>
        <p style="margin-top:15px; color:#fff; text-shadow: var(--text-outline); font-size:18px;">🎉 تم قبولك! يمكنك العودة الآن.</p>
      `;
    } else {
      area.innerHTML = `
        <div style="font-size:70px;">⚠️</div>
        <div class="success-text" style="color:#ff4757;">فشل التحقق</div>
        <p style="margin-top:15px; color:#fff; text-shadow: var(--text-outline); font-size:18px;">${msg || 'حاول مرة أخرى'}</p>
      `;
    }
  }
</script>
</body>
</html>
